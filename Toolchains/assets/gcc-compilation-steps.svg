<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <marker id="arr" viewBox="0 0 8 8" refX="4" refY="8" markerWidth="8" markerHeight="8" orient="auto">
      <polygon points="0 0, 4 8, 8 0" fill="#475569" />
    </marker>
  </defs>

  <rect width="600" height="720" rx="12" fill="url(#bg)" />

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">GCC Compilation Pipeline</text>

  <!-- ── Stage 1: Source ── -->
  <rect x="140" y="70" width="320" height="56" rx="10" fill="#16162a" stroke="#3b82f6" stroke-width="1.5" />
  <text x="300" y="96" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">📄  source.c</text>
  <text x="300" y="116" text-anchor="middle" fill="#64748b" font-size="11">C / C++ source code</text>

  <!-- Arrow + output -->
  <line x1="300" y1="126" x2="300" y2="158" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="340" y="148" fill="#475569" font-size="10" font-weight="600">gcc -E</text>

  <!-- ── Stage 2: Preprocessor ── -->
  <rect x="140" y="168" width="320" height="56" rx="10" fill="#16162a" stroke="#8b5cf6" stroke-width="1.5" />
  <text x="300" y="194" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">⚙️  Preprocessor (cpp)</text>
  <text x="300" y="214" text-anchor="middle" fill="#64748b" font-size="11">Expand #include, #define, macros → .i</text>

  <!-- Arrow + output -->
  <line x1="300" y1="224" x2="300" y2="256" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="340" y="246" fill="#475569" font-size="10" font-weight="600">gcc -S</text>

  <!-- ── Stage 3: Compiler ── -->
  <rect x="140" y="266" width="320" height="56" rx="10" fill="#16162a" stroke="#ec4899" stroke-width="1.5" />
  <text x="300" y="292" text-anchor="middle" fill="#f9a8d4" font-size="15" font-weight="700">🔧  Compiler (cc1)</text>
  <text x="300" y="312" text-anchor="middle" fill="#64748b" font-size="11">C → Assembly, optimizations → .s</text>

  <!-- Arrow + output -->
  <line x1="300" y1="322" x2="300" y2="354" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="340" y="344" fill="#475569" font-size="10" font-weight="600">gcc -c</text>

  <!-- ── Stage 4: Assembler ── -->
  <rect x="140" y="364" width="320" height="56" rx="10" fill="#16162a" stroke="#f59e0b" stroke-width="1.5" />
  <text x="300" y="390" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="700">🏭  Assembler (as)</text>
  <text x="300" y="410" text-anchor="middle" fill="#64748b" font-size="11">Assembly → machine code → .o</text>

  <!-- Arrow + output -->
  <line x1="300" y1="420" x2="300" y2="452" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)" />
  <text x="340" y="442" fill="#475569" font-size="10" font-weight="600">gcc</text>

  <!-- ── Stage 5: Linker ── -->
  <rect x="140" y="462" width="320" height="56" rx="10" fill="#16162a" stroke="#10b981" stroke-width="1.5" />
  <text x="300" y="488" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">🔗  Linker (ld)</text>
  <text x="300" y="508" text-anchor="middle" fill="#64748b" font-size="11">Combine .o + libraries → ELF</text>

  <!-- Arrow -->
  <line x1="300" y1="518" x2="300" y2="550" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ── Stage 6: Executable ── -->
  <rect x="140" y="560" width="320" height="56" rx="10" fill="#16162a" stroke="#06b6d4" stroke-width="1.5" />
  <text x="300" y="586" text-anchor="middle" fill="#67e8f9" font-size="15" font-weight="700">🚀  Executable (a.out)</text>
  <text x="300" y="606" text-anchor="middle" fill="#64748b" font-size="11">ELF binary — ready to run</text>

  <!-- Binutils note -->
  <text x="540" y="392" text-anchor="middle" fill="#334155" font-size="9" font-weight="600">Binutils</text>
  <line x1="540" y1="396" x2="540" y2="510" stroke="#334155" stroke-width="1" stroke-dasharray="4,3" />
  <text x="540" y="490" text-anchor="middle" fill="#334155" font-size="9" font-weight="600">Binutils</text>

  <!-- Footer -->
  <text x="300" y="660" text-anchor="middle" fill="#334155" font-size="10">Assembler (as) and Linker (ld) are from Binutils</text>
  <text x="300" y="678" text-anchor="middle" fill="#334155" font-size="10">GCC driver orchestrates all stages</text>
  <text x="300" y="706" text-anchor="middle" fill="#1e293b" font-size="9">Use  gcc -v main.c  to see each step</text>
</svg>
