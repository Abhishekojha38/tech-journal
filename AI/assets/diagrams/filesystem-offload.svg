<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260" font-family="Inter, system-ui, sans-serif">
  <rect width="500" height="260" rx="12" fill="#0f172a"/>
  <text x="250" y="25" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Filesystem Context Offloading</text>
  <!-- LLM Context -->
  <rect x="130" y="45" width="240" height="50" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="68" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">LLM Context Window</text>
  <text x="250" y="84" text-anchor="middle" fill="#94a3b8" font-size="10">keeps small &amp; focused</text>
  <!-- Write arrow -->
  <line x1="200" y1="95" x2="200" y2="130" stroke="#f472b6" stroke-width="1.5"/>
  <polygon points="195,128 205,128 200,135" fill="#f472b6"/>
  <text x="185" y="118" fill="#f472b6" font-size="10" text-anchor="end">write</text>
  <!-- Read arrow -->
  <line x1="300" y1="130" x2="300" y2="95" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="295,97 305,97 300,90" fill="#22d3ee"/>
  <text x="315" y="118" fill="#22d3ee" font-size="10">read</text>
  <!-- Filesystem box -->
  <rect x="60" y="135" width="380" height="110" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="250" y="158" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Filesystem</text>
  <!-- File icons -->
  <rect x="85" y="170" width="100" height="35" rx="5" fill="#0f172a" stroke="#6366f1" stroke-width="1"/>
  <text x="135" y="192" text-anchor="middle" fill="#c7d2fe" font-size="11">📄 todo.md</text>
  <rect x="200" y="170" width="100" height="35" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="250" y="192" text-anchor="middle" fill="#c4b5fd" font-size="11">📄 notes.md</text>
  <rect x="315" y="170" width="110" height="35" rx="5" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="370" y="192" text-anchor="middle" fill="#67e8f9" font-size="11">📁 memory/</text>
  <text x="200" y="230" text-anchor="middle" fill="#f472b6" font-size="10">📁 research_data/</text>
</svg>
