<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260" font-family="Inter, system-ui, sans-serif">
  <rect width="500" height="260" rx="12" fill="#0f172a"/>
  <text x="250" y="25" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Scratchpad Offloading</text>
  <!-- LLM Agent box -->
  <rect x="80" y="40" width="340" height="70" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="250" y="65" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">LLM Agent</text>
  <text x="250" y="85" text-anchor="middle" fill="#94a3b8" font-size="10">"I need to save this for later"</text>
  <!-- write arrow -->
  <line x1="180" y1="110" x2="180" y2="145" stroke="#f472b6" stroke-width="1.5"/>
  <polygon points="175,143 185,143 180,150" fill="#f472b6"/>
  <text x="160" y="132" fill="#f472b6" font-size="10" text-anchor="end">write</text>
  <!-- read arrow -->
  <line x1="320" y1="145" x2="320" y2="110" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="315,112 325,112 320,105" fill="#22d3ee"/>
  <text x="340" y="132" fill="#22d3ee" font-size="10">read</text>
  <!-- Scratchpad box -->
  <rect x="60" y="150" width="380" height="85" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="250" y="172" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Scratchpad / State (outside context)</text>
  <!-- Inner items -->
  <rect x="85" y="185" width="130" height="30" rx="5" fill="#0f172a" stroke="#6366f1" stroke-width="1"/>
  <text x="150" y="205" text-anchor="middle" fill="#c7d2fe" font-size="10">📋 Plan</text>
  <rect x="235" y="185" width="180" height="30" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="325" y="205" text-anchor="middle" fill="#c4b5fd" font-size="10">📝 Research Notes</text>
</svg>
