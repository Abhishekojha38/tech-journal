<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="wf" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#334155"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#334155"/></linearGradient>
  </defs>
  <rect width="620" height="180" rx="12" fill="#0f172a"/>
  <!-- Workflow side -->
  <text x="150" y="25" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">Workflow (predefined path)</text>
  <rect x="20" y="40" width="90" height="40" rx="6" fill="url(#wf)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="65" y="65" text-anchor="middle" fill="#e2e8f0" font-size="12">Step A</text>
  <path d="M110,60 L135,60" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow1)"/>
  <rect x="140" y="40" width="90" height="40" rx="6" fill="url(#wf)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="185" y="65" text-anchor="middle" fill="#e2e8f0" font-size="12">Step B</text>
  <path d="M230,60 L255,60" stroke="#6366f1" stroke-width="2"/>
  <rect x="260" y="40" width="90" height="40" rx="6" fill="url(#wf)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="305" y="65" text-anchor="middle" fill="#e2e8f0" font-size="12">Step C</text>
  <!-- Arrows -->
  <polygon points="133,55 133,65 138,60" fill="#6366f1"/>
  <polygon points="253,55 253,65 258,60" fill="#6366f1"/>
  <text x="185" y="105" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">fixed execution order</text>
  <!-- Divider -->
  <line x1="370" y1="10" x2="370" y2="170" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <!-- Agent side -->
  <text x="490" y="25" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Agent (dynamic decisions)</text>
  <rect x="440" y="40" width="100" height="40" rx="6" fill="url(#ag)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="490" y="65" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">LLM</text>
  <!-- Decision arrows -->
  <polygon points="540,50 555,50 555,46" fill="#22d3ee"/>
  <line x1="540" y1="50" x2="555" y2="50" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="568" y="47" fill="#94a3b8" font-size="10">decides</text>
  <rect x="555" y="35" width="50" height="24" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <text x="580" y="52" text-anchor="middle" fill="#67e8f9" font-size="10">Tool X</text>
  <!-- Second branch -->
  <line x1="490" y1="80" x2="490" y2="100" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="485,98 495,98 490,105" fill="#22d3ee"/>
  <text x="510" y="93" fill="#94a3b8" font-size="10">decides</text>
  <rect x="440" y="105" width="100" height="24" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <text x="490" y="121" text-anchor="middle" fill="#67e8f9" font-size="10">Tool Y</text>
  <line x1="490" y1="129" x2="490" y2="145" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="485,143 495,143 490,150" fill="#22d3ee"/>
  <text x="510" y="140" fill="#94a3b8" font-size="10">decides</text>
  <rect x="440" y="150" width="100" height="24" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <text x="490" y="166" text-anchor="middle" fill="#67e8f9" font-size="10">Tool Z</text>
</svg>
