<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" font-family="Inter, system-ui, sans-serif">
  <rect width="600" height="220" rx="12" fill="#0f172a"/>
  <text x="300" y="25" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">RAG Pipeline</text>
  <!-- Documents -->
  <rect x="20" y="55" width="100" height="80" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="70" y="78" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Documents</text>
  <text x="70" y="95" text-anchor="middle" fill="#94a3b8" font-size="10">Doc 1</text>
  <text x="70" y="109" text-anchor="middle" fill="#94a3b8" font-size="10">Doc 2</text>
  <text x="70" y="123" text-anchor="middle" fill="#94a3b8" font-size="10">Doc 3</text>
  <!-- Arrow: chunk -->
  <line x1="120" y1="95" x2="165" y2="95" stroke="#a78bfa" stroke-width="1.5"/>
  <polygon points="163,90 163,100 170,95" fill="#a78bfa"/>
  <text x="143" y="86" text-anchor="middle" fill="#a78bfa" font-size="9">chunk</text>
  <!-- Vector DB -->
  <rect x="170" y="60" width="120" height="70" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="230" y="85" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">Vector DB</text>
  <text x="230" y="102" text-anchor="middle" fill="#94a3b8" font-size="10">Embed &amp; Store</text>
  <!-- User question -->
  <rect x="20" y="165" width="130" height="35" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="85" y="187" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">User Question</text>
  <!-- Arrow from user to retriever -->
  <line x1="150" y1="182" x2="340" y2="182" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5"/>
  <line x1="340" y1="182" x2="340" y2="130" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5"/>
  <!-- Retrieve -->
  <line x1="230" y1="130" x2="230" y2="145" stroke="#475569" stroke-width="1"/>
  <rect x="285" y="60" width="120" height="70" rx="8" fill="#164e63" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="345" y="85" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">Retrieve</text>
  <text x="345" y="102" text-anchor="middle" fill="#94a3b8" font-size="10">query + match</text>
  <!-- Arrow: retrieve to Vector DB -->
  <line x1="290" y1="95" x2="285" y2="95" stroke="#475569" stroke-width="1"/>
  <!-- Arrow: chunks to LLM -->
  <line x1="405" y1="95" x2="450" y2="95" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="448,90 448,100 455,95" fill="#22d3ee"/>
  <text x="428" y="86" text-anchor="middle" fill="#22d3ee" font-size="9">chunks</text>
  <!-- LLM -->
  <rect x="455" y="65" width="120" height="60" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <text x="515" y="92" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="700">LLM</text>
  <text x="515" y="108" text-anchor="middle" fill="#94a3b8" font-size="10">→ Answer</text>
</svg>
