<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="Inter, system-ui, sans-serif">
  <rect width="440" height="200" rx="12" fill="#0f172a"/>
  <text x="220" y="25" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Context Quarantine</text>
  <!-- Outer boundary -->
  <rect x="30" y="40" width="380" height="135" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="220" y="62" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Isolated Threads</text>
  <!-- Thread A -->
  <rect x="55" y="75" width="150" height="75" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="130" y="98" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">Thread A</text>
  <text x="130" y="115" text-anchor="middle" fill="#94a3b8" font-size="10">LLM 1 · Context A</text>
  <text x="130" y="140" text-anchor="middle" fill="#6366f1" font-size="18">🔒</text>
  <!-- Thread B -->
  <rect x="235" y="75" width="150" height="75" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="310" y="98" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">Thread B</text>
  <text x="310" y="115" text-anchor="middle" fill="#94a3b8" font-size="10">LLM 2 · Context B</text>
  <text x="310" y="140" text-anchor="middle" fill="#22d3ee" font-size="18">🔒</text>
  <!-- No-leak X -->
  <line x1="205" y1="105" x2="235" y2="105" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="103" text-anchor="middle" fill="#ef4444" font-size="16" font-weight="900">✕</text>
  <!-- Caption -->
  <text x="220" y="192" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">No context leaks between threads</text>
</svg>
