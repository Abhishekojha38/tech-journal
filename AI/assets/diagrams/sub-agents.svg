<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="Inter, system-ui, sans-serif">
  <rect width="520" height="260" rx="12" fill="#0f172a"/>
  <text x="260" y="25" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Sub-Agent Isolation</text>
  <!-- Main Agent -->
  <rect x="180" y="40" width="160" height="45" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="260" y="60" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="700">Main Agent</text>
  <text x="260" y="76" text-anchor="middle" fill="#94a3b8" font-size="10">Orchestrator</text>
  <!-- Lines down -->
  <line x1="120" y1="85" x2="120" y2="120" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="85" x2="260" y2="120" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="85" x2="400" y2="120" stroke="#475569" stroke-width="1.5"/>
  <line x1="120" y1="85" x2="400" y2="85" stroke="#475569" stroke-width="1.5"/>
  <polygon points="115,118 125,118 120,125" fill="#475569"/>
  <polygon points="255,118 265,118 260,125" fill="#475569"/>
  <polygon points="395,118 405,118 400,125" fill="#475569"/>
  <!-- Sub agents -->
  <rect x="50" y="125" width="140" height="50" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="120" y="148" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="600">Sub-Agent A</text>
  <text x="120" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">Research</text>

  <rect x="190" y="125" width="140" height="50" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="260" y="148" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">Sub-Agent B</text>
  <text x="260" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">Code</text>

  <rect x="330" y="125" width="140" height="50" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="148" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Sub-Agent C</text>
  <text x="400" y="164" text-anchor="middle" fill="#94a3b8" font-size="10">Review</text>
  <!-- Own context labels -->
  <text x="120" y="197" text-anchor="middle" fill="#f472b6" font-size="10">Own Context</text>
  <text x="260" y="197" text-anchor="middle" fill="#22d3ee" font-size="10">Own Context</text>
  <text x="400" y="197" text-anchor="middle" fill="#a78bfa" font-size="10">Own Context</text>
  <!-- Warning -->
  <text x="30" y="230" fill="#fbbf24" font-size="11">⚠ Risk: sub-agents may make conflicting decisions</text>
  <text x="30" y="248" fill="#4ade80" font-size="11">✓ Mitigation: limit sub-agents to execution, not decisions</text>
</svg>
