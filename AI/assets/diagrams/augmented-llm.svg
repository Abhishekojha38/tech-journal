<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" font-family="Inter, system-ui, sans-serif">
  <rect width="520" height="220" rx="12" fill="#0f172a"/>
  <!-- Retrieval -->
  <rect x="20" y="70" width="110" height="55" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="75" y="93" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="600">Retrieval</text>
  <text x="75" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">RAG / Search</text>
  <!-- LLM Core -->
  <rect x="180" y="50" width="160" height="90" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="260" y="85" text-anchor="middle" fill="#c7d2fe" font-size="15" font-weight="700">LLM</text>
  <text x="260" y="105" text-anchor="middle" fill="#94a3b8" font-size="11">(Core Model)</text>
  <!-- Tools -->
  <rect x="390" y="70" width="110" height="55" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="445" y="93" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">Tools</text>
  <text x="445" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">APIs / Code</text>
  <!-- Memory -->
  <rect x="210" y="165" width="100" height="45" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="260" y="192" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Memory</text>
  <!-- Arrows: bidirectional -->
  <line x1="130" y1="97" x2="178" y2="97" stroke="#f472b6" stroke-width="1.5"/>
  <polygon points="130,93 130,101 122,97" fill="#f472b6"/>
  <polygon points="176,93 176,101 184,97" fill="#f472b6"/>
  <line x1="340" y1="97" x2="388" y2="97" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="340,93 340,101 332,97" fill="#22d3ee"/>
  <polygon points="386,93 386,101 394,97" fill="#22d3ee"/>
  <!-- Arrow down to memory -->
  <line x1="260" y1="140" x2="260" y2="163" stroke="#a78bfa" stroke-width="1.5"/>
  <polygon points="255,161 265,161 260,168" fill="#a78bfa"/>
  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">The Augmented LLM</text>
</svg>
