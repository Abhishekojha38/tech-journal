<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" font-family="Inter, system-ui, sans-serif">
  <rect width="420" height="360" rx="12" fill="#0f172a"/>
  <text x="210" y="25" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Scratchpad Research Flow</text>
  <!-- Step 1 -->
  <rect x="120" y="40" width="180" height="35" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="210" y="62" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">1. Check Scratchpad</text>
  <line x1="210" y1="75" x2="210" y2="90" stroke="#475569" stroke-width="1.5"/>
  <polygon points="205,88 215,88 210,95" fill="#475569"/>
  <!-- Step 2 -->
  <rect x="120" y="95" width="180" height="35" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="210" y="117" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">2. Create Plan</text>
  <line x1="210" y1="130" x2="210" y2="145" stroke="#475569" stroke-width="1.5"/>
  <polygon points="205,143 215,143 210,150" fill="#475569"/>
  <!-- Step 3 -->
  <rect x="120" y="150" width="180" height="35" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="210" y="172" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">3. Write to Scratchpad</text>
  <line x1="210" y1="185" x2="210" y2="200" stroke="#475569" stroke-width="1.5"/>
  <polygon points="205,198 215,198 210,205" fill="#475569"/>
  <!-- Step 4 -->
  <rect x="50" y="205" width="150" height="35" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="125" y="227" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">4. Search</text>
  <!-- Arrow to step 5 -->
  <line x1="200" y1="222" x2="230" y2="222" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="228,217 228,227 235,222" fill="#22d3ee"/>
  <!-- Step 5 -->
  <rect x="235" y="205" width="150" height="35" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="310" y="227" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">5. Update Scratchpad</text>
  <!-- Arrow down from step 5 -->
  <line x1="310" y1="240" x2="310" y2="260" stroke="#475569" stroke-width="1.5"/>
  <polygon points="305,258 315,258 310,265" fill="#475569"/>
  <!-- Step 6: iterate -->
  <rect x="220" y="265" width="160" height="35" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="300" y="287" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">6. More to do?</text>
  <!-- Yes loop back -->
  <path d="M220,282 L50,282 L50,222 L50,222" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5"/>
  <polygon points="45,222 55,222 50,216" fill="#a78bfa"/>
  <text x="35" y="255" fill="#a78bfa" font-size="9" font-weight="600">yes</text>
  <!-- No arrow down -->
  <line x1="310" y1="300" x2="310" y2="320" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="305,318 315,318 310,325" fill="#4ade80"/>
  <text x="328" y="314" fill="#94a3b8" font-size="9">no</text>
  <!-- Step 7 -->
  <rect x="235" y="325" width="150" height="30" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="310" y="345" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">7. Complete Task ✓</text>
</svg>
