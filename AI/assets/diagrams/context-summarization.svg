<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 110" font-family="Inter, system-ui, sans-serif">
  <rect width="600" height="110" rx="12" fill="#0f172a"/>
  <text x="300" y="22" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Context Summarization Pipeline</text>
  <!-- Retrieval Tool -->
  <rect x="15" y="38" width="130" height="50" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="80" y="60" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Retrieval Tool</text>
  <text x="80" y="76" text-anchor="middle" fill="#94a3b8" font-size="9">verbose</text>
  <!-- Arrow -->
  <line x1="145" y1="63" x2="195" y2="63" stroke="#a78bfa" stroke-width="1.5"/>
  <polygon points="193,58 193,68 200,63" fill="#a78bfa"/>
  <text x="170" y="55" text-anchor="middle" fill="#94a3b8" font-size="8">raw docs</text>
  <!-- Summarize LLM -->
  <rect x="200" y="38" width="160" height="50" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="280" y="60" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Summarize LLM</text>
  <text x="280" y="76" text-anchor="middle" fill="#94a3b8" font-size="9">50-70% shorter</text>
  <!-- Arrow -->
  <line x1="360" y1="63" x2="410" y2="63" stroke="#fbbf24" stroke-width="1.5"/>
  <polygon points="408,58 408,68 415,63" fill="#fbbf24"/>
  <text x="385" y="55" text-anchor="middle" fill="#94a3b8" font-size="8">summary</text>
  <!-- Main LLM -->
  <rect x="415" y="38" width="160" height="50" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="495" y="60" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Main LLM</text>
  <text x="495" y="76" text-anchor="middle" fill="#94a3b8" font-size="9">Agent (dense context)</text>
</svg>
