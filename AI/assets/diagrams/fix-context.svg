<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 170" font-family="Inter, system-ui, sans-serif">
  <rect width="560" height="170" rx="12" fill="#0f172a"/>
  <text x="280" y="25" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Fix Your Context</text>
  <!-- Row 1 -->
  <rect x="20" y="42" width="120" height="42" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="80" y="68" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">Offload</text>
  <rect x="155" y="42" width="80" height="42" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="195" y="68" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">RAG</text>
  <rect x="250" y="42" width="120" height="42" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="310" y="68" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Tool Loadout</text>
  <!-- Row 2 -->
  <rect x="20" y="100" width="120" height="42" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="80" y="126" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">Prune</text>
  <rect x="155" y="100" width="120" height="42" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="215" y="126" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Summarize</text>
  <rect x="290" y="100" width="140" height="42" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="360" y="126" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Quarantine</text>
  <!-- Caption -->
  <text x="280" y="160" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">6 strategies to manage LLM context</text>
</svg>
